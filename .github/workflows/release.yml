name: Release

# Triggered manually via GitHub Actions UI or /release skill
on:
  workflow_dispatch:
    inputs:
      run_id:
        description: 'CI workflow run ID to release (leave empty for latest successful)'
        required: false
        type: string
        default: ''
      release_notes:
        description: 'Release notes (markdown)'
        required: false
        type: string
        default: ''
  # Dummy push trigger to prevent GitHub showing "failed" runs on every push
  push:
    paths:
      - '.github/workflows/this-file-does-not-exist'

permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    environment: npm

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get CI run ID
        id: get-run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "${{ inputs.run_id }}" ]; then
            RUN_ID="${{ inputs.run_id }}"
          else
            # Get latest successful CI run on main
            RUN_ID=$(gh run list --workflow=ci.yml --branch=main --status=success --limit=1 --json databaseId --jq '.[0].databaseId')
          fi

          if [ -z "$RUN_ID" ]; then
            echo "No successful CI run found"
            exit 1
          fi

          echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT
          echo "Using CI run: $RUN_ID"

      - name: Download all artifacts from CI
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          rm -rf artifacts
          mkdir -p artifacts
          gh run download ${{ steps.get-run.outputs.run_id }} --dir artifacts
          echo "Downloaded artifacts:"
          ls -R artifacts

      - name: Get version from artifacts
        id: version
        run: |
          VERSION=$(cat artifacts/version/version.txt)
          echo "Version from CI: $VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          # Validate CalVer format
          if ! echo "$VERSION" | grep -Eq '^[0-9]{2}\.[0-9]{1,2}\.[0-9]{3,4}$'; then
            echo "Invalid CalVer format: $VERSION"
            exit 1
          fi

      - name: Check if release already exists
        id: check-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if gh release view "$VERSION" &>/dev/null; then
            echo "Release $VERSION already exists"
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "Release $VERSION does not exist yet"
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create git tag
        if: steps.check-release.outputs.exists == 'false'
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          # Get the commit SHA from the CI run
          RUN_ID="${{ steps.get-run.outputs.run_id }}"
          COMMIT_SHA=$(gh run view "$RUN_ID" --json headSha --jq '.headSha')

          echo "Creating tag $VERSION at commit $COMMIT_SHA"
          git tag "$VERSION" "$COMMIT_SHA"
          git push origin "$VERSION"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Update npm for OIDC trusted publishing
        run: |
          npm install -g npm@latest
          npm config set registry https://registry.npmjs.org/

      - name: Create GitHub release (treeline repo)
        if: steps.check-release.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_NOTES: ${{ inputs.release_notes }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          if [ -z "$RELEASE_NOTES" ]; then
            RELEASE_NOTES="Release $VERSION"
          fi

          # Create release
          gh release create "$VERSION" \
            --title "Treeline $VERSION" \
            --notes "$RELEASE_NOTES"

          # Upload desktop artifacts (macOS has nested dmg/ and macos/ subdirs)
          # macOS ARM64
          for f in artifacts/desktop-macos-arm64/dmg/*.dmg; do
            [ -f "$f" ] && gh release upload "$VERSION" "$f" --clobber || true
          done
          # Rename updater artifacts to include architecture (both archs produce Treeline.app.tar.gz)
          for f in artifacts/desktop-macos-arm64/macos/*.app.tar.gz; do
            if [ -f "$f" ]; then
              cp "$f" "Treeline_aarch64.app.tar.gz"
              gh release upload "$VERSION" "Treeline_aarch64.app.tar.gz" --clobber || true
            fi
          done
          for f in artifacts/desktop-macos-arm64/macos/*.app.tar.gz.sig; do
            if [ -f "$f" ]; then
              cp "$f" "Treeline_aarch64.app.tar.gz.sig"
              gh release upload "$VERSION" "Treeline_aarch64.app.tar.gz.sig" --clobber || true
            fi
          done
          # macOS x64
          for f in artifacts/desktop-macos-x64/dmg/*.dmg; do
            [ -f "$f" ] && gh release upload "$VERSION" "$f" --clobber || true
          done
          for f in artifacts/desktop-macos-x64/macos/*.app.tar.gz; do
            if [ -f "$f" ]; then
              cp "$f" "Treeline_x64.app.tar.gz"
              gh release upload "$VERSION" "Treeline_x64.app.tar.gz" --clobber || true
            fi
          done
          for f in artifacts/desktop-macos-x64/macos/*.app.tar.gz.sig; do
            if [ -f "$f" ]; then
              cp "$f" "Treeline_x64.app.tar.gz.sig"
              gh release upload "$VERSION" "Treeline_x64.app.tar.gz.sig" --clobber || true
            fi
          done
          for f in artifacts/desktop-linux-x64/*.AppImage; do
            [ -f "$f" ] && gh release upload "$VERSION" "$f" --clobber || true
          done
          for f in artifacts/desktop-linux-x64/*.AppImage.sig; do
            [ -f "$f" ] && gh release upload "$VERSION" "$f" --clobber || true
          done
          for f in artifacts/desktop-windows-x64/*.exe; do
            [ -f "$f" ] && gh release upload "$VERSION" "$f" --clobber || true
          done
          for f in artifacts/desktop-windows-x64/*.exe.sig; do
            [ -f "$f" ] && gh release upload "$VERSION" "$f" --clobber || true
          done

          # Upload CLI binaries (copy with platform suffix for clarity)
          if [ -f "artifacts/cli-linux-x64/tl" ]; then
            cp artifacts/cli-linux-x64/tl tl-linux-x64
            gh release upload "$VERSION" tl-linux-x64 --clobber || true
          fi
          if [ -f "artifacts/cli-macos-arm64/tl" ]; then
            cp artifacts/cli-macos-arm64/tl tl-macos-arm64
            gh release upload "$VERSION" tl-macos-arm64 --clobber || true
          fi
          if [ -f "artifacts/cli-macos-x64/tl" ]; then
            cp artifacts/cli-macos-x64/tl tl-macos-x64
            gh release upload "$VERSION" tl-macos-x64 --clobber || true
          fi
          if [ -f "artifacts/cli-windows-x64/tl.exe" ]; then
            cp artifacts/cli-windows-x64/tl.exe tl-windows-x64.exe
            gh release upload "$VERSION" tl-windows-x64.exe --clobber || true
          fi

      - name: Create GitHub release (treeline-releases - dual publish)
        if: steps.check-release.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.RELEASES_TOKEN }}
          RELEASE_NOTES: ${{ inputs.release_notes }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          RELEASES_REPO="treeline-money/treeline-releases"

          if [ -z "$RELEASE_NOTES" ]; then
            RELEASE_NOTES="Release $VERSION"
          fi

          # Create release in treeline-releases (for existing users)
          gh release create "$VERSION" \
            --repo "$RELEASES_REPO" \
            --title "Treeline $VERSION" \
            --notes "$RELEASE_NOTES" \
            || echo "Release may already exist"

          # Copy latest.json from previous release to maintain production updates
          PREV_RELEASE=$(gh release list --repo "$RELEASES_REPO" --limit 2 --json tagName --jq '.[1].tagName // empty')
          if [ -n "$PREV_RELEASE" ]; then
            echo "Copying latest.json from $PREV_RELEASE"
            gh release download "$PREV_RELEASE" --repo "$RELEASES_REPO" --pattern "latest.json" --dir /tmp || true
            if [ -f /tmp/latest.json ]; then
              gh release upload "$VERSION" /tmp/latest.json --repo "$RELEASES_REPO" --clobber
              rm /tmp/latest.json
            fi
          fi

          # Upload desktop artifacts (macOS has nested dmg/ and macos/ subdirs)
          # macOS ARM64
          for f in artifacts/desktop-macos-arm64/dmg/*.dmg; do
            [ -f "$f" ] && gh release upload "$VERSION" "$f" --repo "$RELEASES_REPO" --clobber || true
          done
          # Updater artifacts already renamed with arch suffix earlier
          [ -f "Treeline_aarch64.app.tar.gz" ] && gh release upload "$VERSION" "Treeline_aarch64.app.tar.gz" --repo "$RELEASES_REPO" --clobber || true
          [ -f "Treeline_aarch64.app.tar.gz.sig" ] && gh release upload "$VERSION" "Treeline_aarch64.app.tar.gz.sig" --repo "$RELEASES_REPO" --clobber || true
          # macOS x64
          for f in artifacts/desktop-macos-x64/dmg/*.dmg; do
            [ -f "$f" ] && gh release upload "$VERSION" "$f" --repo "$RELEASES_REPO" --clobber || true
          done
          [ -f "Treeline_x64.app.tar.gz" ] && gh release upload "$VERSION" "Treeline_x64.app.tar.gz" --repo "$RELEASES_REPO" --clobber || true
          [ -f "Treeline_x64.app.tar.gz.sig" ] && gh release upload "$VERSION" "Treeline_x64.app.tar.gz.sig" --repo "$RELEASES_REPO" --clobber || true
          for f in artifacts/desktop-linux-x64/*.AppImage; do
            [ -f "$f" ] && gh release upload "$VERSION" "$f" --repo "$RELEASES_REPO" --clobber || true
          done
          for f in artifacts/desktop-linux-x64/*.AppImage.sig; do
            [ -f "$f" ] && gh release upload "$VERSION" "$f" --repo "$RELEASES_REPO" --clobber || true
          done
          for f in artifacts/desktop-windows-x64/*.exe; do
            [ -f "$f" ] && gh release upload "$VERSION" "$f" --repo "$RELEASES_REPO" --clobber || true
          done
          for f in artifacts/desktop-windows-x64/*.exe.sig; do
            [ -f "$f" ] && gh release upload "$VERSION" "$f" --repo "$RELEASES_REPO" --clobber || true
          done

      - name: Generate and upload latest-staging.json
        env:
          GH_TOKEN: ${{ secrets.RELEASES_TOKEN }}
          RELEASE_NOTES: ${{ inputs.release_notes }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          RELEASES_REPO="treeline-money/treeline-releases"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          if [ -z "$RELEASE_NOTES" ]; then
            RELEASE_NOTES="Release $VERSION"
          fi
          RELEASE_NOTES_ESCAPED=$(echo "$RELEASE_NOTES" | jq -Rs '.')

          # Read signatures
          LINUX_SIG=""
          MACOS_ARM64_SIG=""
          MACOS_X64_SIG=""
          WINDOWS_SIG=""

          for f in artifacts/desktop-linux-x64/*.AppImage.sig; do
            [ -f "$f" ] && LINUX_SIG=$(cat "$f") && break
          done

          for f in artifacts/desktop-macos-arm64/macos/*.app.tar.gz.sig; do
            [ -f "$f" ] && MACOS_ARM64_SIG=$(cat "$f") && break
          done

          for f in artifacts/desktop-macos-x64/macos/*.app.tar.gz.sig; do
            [ -f "$f" ] && MACOS_X64_SIG=$(cat "$f") && break
          done

          for f in artifacts/desktop-windows-x64/*.exe.sig; do
            [ -f "$f" ] && WINDOWS_SIG=$(cat "$f") && break
          done

          # Find artifact filenames (updater artifacts renamed with arch suffix)
          LINUX_FILE=""
          MACOS_ARM64_FILE="Treeline_aarch64.app.tar.gz"
          MACOS_X64_FILE="Treeline_x64.app.tar.gz"
          WINDOWS_FILE=""

          for f in artifacts/desktop-linux-x64/*.AppImage; do
            [ -f "$f" ] && LINUX_FILE=$(basename "$f") && break
          done

          for f in artifacts/desktop-windows-x64/*.exe; do
            [ -f "$f" ] && WINDOWS_FILE=$(basename "$f") && break
          done

          # Generate latest-staging.json
          echo "{" > latest-staging.json
          echo "  \"version\": \"${VERSION}\"," >> latest-staging.json
          echo "  \"notes\": ${RELEASE_NOTES_ESCAPED}," >> latest-staging.json
          echo "  \"pub_date\": \"${PUB_DATE}\"," >> latest-staging.json
          echo "  \"platforms\": {" >> latest-staging.json

          FIRST_PLATFORM=true

          if [ -n "$LINUX_FILE" ] && [ -n "$LINUX_SIG" ]; then
            if [ "$FIRST_PLATFORM" = false ]; then echo "," >> latest-staging.json; fi
            FIRST_PLATFORM=false
            echo "    \"linux-x86_64\": {" >> latest-staging.json
            echo "      \"signature\": \"${LINUX_SIG}\"," >> latest-staging.json
            echo "      \"url\": \"https://github.com/${RELEASES_REPO}/releases/download/${VERSION}/${LINUX_FILE}\"" >> latest-staging.json
            echo "    }" >> latest-staging.json
          fi

          if [ -n "$MACOS_ARM64_SIG" ]; then
            if [ "$FIRST_PLATFORM" = false ]; then echo "," >> latest-staging.json; fi
            FIRST_PLATFORM=false
            echo "    \"darwin-aarch64\": {" >> latest-staging.json
            echo "      \"signature\": \"${MACOS_ARM64_SIG}\"," >> latest-staging.json
            echo "      \"url\": \"https://github.com/${RELEASES_REPO}/releases/download/${VERSION}/${MACOS_ARM64_FILE}\"" >> latest-staging.json
            echo "    }" >> latest-staging.json
          fi

          if [ -n "$MACOS_X64_SIG" ]; then
            if [ "$FIRST_PLATFORM" = false ]; then echo "," >> latest-staging.json; fi
            FIRST_PLATFORM=false
            echo "    \"darwin-x86_64\": {" >> latest-staging.json
            echo "      \"signature\": \"${MACOS_X64_SIG}\"," >> latest-staging.json
            echo "      \"url\": \"https://github.com/${RELEASES_REPO}/releases/download/${VERSION}/${MACOS_X64_FILE}\"" >> latest-staging.json
            echo "    }" >> latest-staging.json
          fi

          if [ -n "$WINDOWS_FILE" ] && [ -n "$WINDOWS_SIG" ]; then
            if [ "$FIRST_PLATFORM" = false ]; then echo "," >> latest-staging.json; fi
            FIRST_PLATFORM=false
            echo "    \"windows-x86_64\": {" >> latest-staging.json
            echo "      \"signature\": \"${WINDOWS_SIG}\"," >> latest-staging.json
            echo "      \"url\": \"https://github.com/${RELEASES_REPO}/releases/download/${VERSION}/${WINDOWS_FILE}\"" >> latest-staging.json
            echo "    }" >> latest-staging.json
          fi

          echo "  }" >> latest-staging.json
          echo "}" >> latest-staging.json

          cat latest-staging.json

          # Upload to treeline-releases repo (using RELEASES_TOKEN)
          gh release upload "$VERSION" latest-staging.json --repo "$RELEASES_REPO" --clobber

      - name: Upload latest-staging.json to treeline repo
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          gh release upload "$VERSION" latest-staging.json --clobber

      - name: Pack and upload MCPB extensions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          # Install mcpb CLI
          npm install -g @anthropic-ai/mcpb

          # Pack for each platform (no Linux — Claude Desktop doesn't support it)
          for PLATFORM_SPEC in "macos-arm64:cli-macos-arm64/tl" "macos-x64:cli-macos-x64/tl" "windows-x64:cli-windows-x64/tl.exe"; do
            PLATFORM="${PLATFORM_SPEC%%:*}"
            BINARY_REL="${PLATFORM_SPEC#*:}"
            BINARY_PATH="artifacts/$BINARY_REL"

            if [ ! -f "$BINARY_PATH" ]; then
              echo "Skipping $PLATFORM — binary not found at $BINARY_PATH"
              continue
            fi

            echo "Packing $PLATFORM..."
            bash mcpb/pack.sh "$BINARY_PATH" "$PLATFORM" "$VERSION" .

            MCPB_FILE="treeline-${PLATFORM}.mcpb"
            if [ -f "$MCPB_FILE" ]; then
              gh release upload "$VERSION" "$MCPB_FILE" --clobber || true
              echo "Uploaded $MCPB_FILE"
            fi
          done

      - name: Publish SDK to npm
        continue-on-error: true
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          # Check if version already exists on npm
          if npm view "@treeline-money/plugin-sdk@$VERSION" version 2>/dev/null; then
            echo "Version $VERSION already published to npm, skipping"
            exit 0
          fi

          # Publish the pre-built SDK tarball
          cd artifacts/sdk-npm-package
          npm publish *.tgz --access public --provenance

      - name: Check if OpenClaw skill changed
        id: openclaw_check
        run: |
          # Find the previous release tag
          PREV_TAG=$(git tag --sort=-v:refname | head -2 | tail -1)

          if [ -z "$PREV_TAG" ]; then
            echo "No previous tag found, will publish"
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Comparing openclaw/ against previous tag: $PREV_TAG"

          # Compare skill content excluding the version line
          PREV_CONTENT=$(git show "$PREV_TAG:openclaw/SKILL.md" 2>/dev/null | grep -v "^version: " || echo "")
          CURR_CONTENT=$(grep -v "^version: " openclaw/SKILL.md || echo "")

          if [ "$PREV_CONTENT" = "$CURR_CONTENT" ]; then
            echo "OpenClaw skill unchanged, skipping ClawHub publish"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "OpenClaw skill has changes, will publish"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish OpenClaw skill to ClawHub
        if: steps.openclaw_check.outputs.changed == 'true'
        continue-on-error: true
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          if [ -z "$CLAWHUB_TOKEN" ]; then
            echo "CLAWHUB_TOKEN not set, skipping ClawHub publish"
            exit 0
          fi

          # Install clawhub CLI
          npm install -g clawhub || true

          # Login with token
          clawhub auth login --token "$CLAWHUB_TOKEN" --no-browser || true

          # Publish skill
          clawhub publish openclaw \
            --slug treeline-money \
            --name "Treeline Money" \
            --version "$VERSION" \
            --changelog "Release $VERSION" || echo "ClawHub publish failed (non-fatal)"

      - name: Post to Discord #staging-releases
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_STAGING }}
          RELEASE_NOTES: ${{ inputs.release_notes }}
        run: |
          if [ -z "$DISCORD_WEBHOOK" ]; then
            echo "DISCORD_WEBHOOK_STAGING not set, skipping Discord notification"
            exit 0
          fi

          VERSION="${{ steps.version.outputs.version }}"

          if [ -z "$RELEASE_NOTES" ]; then
            RELEASE_NOTES="Release $VERSION"
          fi
          RELEASE_NOTES_ESCAPED=$(echo "$RELEASE_NOTES" | jq -Rs '.')

          curl -X POST "$DISCORD_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"Treeline $VERSION Release Candidate\",
                \"description\": $RELEASE_NOTES_ESCAPED,
                \"color\": 16761095,
                \"footer\": {\"text\": \"Release Candidate - Test with ~/.treeline/use-staging-updates then run /promote\"}
              }]
            }"
